<!DOCTYPE html>
<html>
<head>
    <title>Регистрация - PIZDA MEDIA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #FFF1E1 0%, #FDF8F2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }
        
        /* Стеклянные шары на фоне */
        body::before {
            content: '';
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(7, 114, 161, 0.15), rgba(7, 114, 161, 0.05));
            top: -100px;
            left: -100px;
            z-index: -1;
            filter: blur(50px);
        }
        
        body::after {
            content: '';
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle at 70% 70%, rgba(255, 189, 115, 0.2), rgba(255, 189, 115, 0.05));
            bottom: -150px;
            right: -150px;
            z-index: -1;
            filter: blur(60px);
        }
        
        .container {
            max-width: 420px;
            width: 100%;
            position: relative;
            z-index: 1;
        }
        
        /* Стеклянная карточка */
        .glass-card {
            padding: 40px 32px;
            border-radius: 32px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(7, 114, 161, 0.1);
        }
        
        h1 {
            color: #0772A1;
            font-size: 32px;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-bottom: 24px;
            text-align: center;
            text-shadow: 0 4px 12px rgba(7, 114, 161, 0.2);
        }
        
        .back-link {
            display: inline-block;
            margin-bottom: 24px;
            color: #0772A1;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }
        
        .back-link:hover {
            background: rgba(7, 114, 161, 0.15);
            border-color: #0772A1;
            transform: translateX(-5px);
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        input {
            width: 100%;
            padding: 16px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            font-size: 15px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(4px);
            color: #364247;
            transition: all 0.3s ease;
        }
        
        input:focus {
            outline: none;
            border-color: rgba(7, 114, 161, 0.5);
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 0 4px rgba(7, 114, 161, 0.1);
        }
        
        input::placeholder {
            color: #364247;
            opacity: 0.5;
        }
        
        button {
            width: 100%;
            padding: 16px;
            background: rgba(7, 114, 161, 0.2);
            backdrop-filter: blur(4px);
            color: #0772A1;
            border: 1px solid rgba(7, 114, 161, 0.3);
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(7, 114, 161, 0.15);
            margin-top: 8px;
        }
        
        button:hover {
            background: rgba(7, 114, 161, 0.35);
            border-color: #0772A1;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(7, 114, 161, 0.25);
        }
        
        .error {
            margin-bottom: 20px;
            padding: 14px 20px;
            border-radius: 30px;
            background: rgba(220, 53, 69, 0.15);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(220, 53, 69, 0.3);
            color: #dc3545;
            font-size: 14px;
            text-align: center;
        }
        
        .link {
            text-align: center;
            margin-top: 24px;
            color: #364247;
            font-size: 15px;
        }
        
        .link a {
            color: #0772A1;
            text-decoration: none;
            font-weight: 600;
            margin-left: 6px;
            transition: color 0.2s ease;
        }
        
        .link a:hover {
            color: #FFBD73;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">← На главную</a>
        
        <div class="glass-card">
            <h1>📝 Регистрация</h1>
            
            {% if error %}
            <div class="error">{{ error }}</div>
            {% endif %}
            
            <form method="POST" action="/register">
                <div class="form-group">
                    <input type="text" name="username" placeholder="Ваше имя (ник)" required>
                </div>
                <div class="form-group">
                    <input type="password" name="password" placeholder="Пароль" required>
                </div>
                <button type="submit">Зарегистрироваться</button>
            </form>
            
            <div class="link">
                Уже есть аккаунт? <a href="/login">Войти</a>
            </div>
        </div>
    </div>
</body>
</html>
