<!DOCTYPE html>
<html>
<head>
    <title>Чат - PIZDA MEDIA</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #FFF1E1 0%, #FDF8F2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
            position: relative;
        }
        
        /* Стеклянные шары на фоне */
        body::before {
            content: '';
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(7, 114, 161, 0.15), rgba(7, 114, 161, 0.05));
            top: -100px;
            left: -100px;
            z-index: -1;
            filter: blur(50px);
        }
        
        body::after {
            content: '';
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle at 70% 70%, rgba(255, 189, 115, 0.2), rgba(255, 189, 115, 0.05));
            bottom: -150px;
            right: -150px;
            z-index: -1;
            filter: blur(60px);
        }
        
        .container {
            max-width: 680px;
            width: 100%;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }
        
        /* Хедер */
        .header {
            padding: 24px;
            margin-bottom: 24px;
            border-radius: 32px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(7, 114, 161, 0.1);
        }
        
        h1 {
            color: #0772A1;
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-bottom: 16px;
            text-shadow: 0 4px 12px rgba(7, 114, 161, 0.2);
            text-align: center;
        }
        
        /* Навигация */
        .user-bar {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 20px;
            padding: 12px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.3);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        .user-bar span {
            color: #364247;
            font-size: 15px;
            font-weight: 500;
        }
        
        .user-bar strong {
            color: #0772A1;
            font-weight: 600;
        }
        
        .nav-links {
            display: flex;
            gap: 12px;
        }
        
        .nav-link {
            color: #364247;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 30px;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        .nav-link:hover {
            background: rgba(7, 114, 161, 0.2);
            border-color: rgba(7, 114, 161, 0.4);
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(7, 114, 161, 0.15);
        }
        
        .back-link {
            display: inline-block;
            margin-bottom: 16px;
            color: #0772A1;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }
        
        .back-link:hover {
            background: rgba(7, 114, 161, 0.15);
            border-color: #0772A1;
            transform: translateX(-5px);
        }
        
        /* Основной контент */
        .content {
            padding: 28px;
            border-radius: 32px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(7, 114, 161, 0.1);
        }
        
        /* Шапка чата */
        .chat-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
            padding: 16px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        .chat-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 12px rgba(7, 114, 161, 0.2);
        }
        
        .chat-avatar-placeholder {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 24px;
            color: #0772A1;
            border: 2px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 12px rgba(7, 114, 161, 0.2);
        }
        
        .chat-info {
            flex: 1;
        }
        
        .chat-name {
            font-weight: 600;
            color: #0772A1;
            font-size: 20px;
            margin-bottom: 4px;
        }
        
        .chat-status {
            color: #364247;
            font-size: 13px;
            opacity: 0.7;
        }
        
        /* Контейнер сообщений */
        .messages-container {
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        /* Сообщение */
        .message {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 20px;
            position: relative;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.own {
            align-self: flex-end;
            background: rgba(7, 114, 161, 0.2);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(7, 114, 161, 0.3);
            color: #0772A1;
            border-bottom-right-radius: 4px;
        }
        
        .message.other {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #364247;
            border-bottom-left-radius: 4px;
        }
        
        .message-content {
            font-size: 15px;
            line-height: 1.5;
            margin-bottom: 4px;
        }
        
        .message-time {
            font-size: 10px;
            opacity: 0.6;
            text-align: right;
        }
        
        .message.own .message-time {
            color: #0772A1;
        }
        
        .message.other .message-time {
            color: #364247;
        }
        
        /* Индикатор печатания */
        .typing-indicator {
            color: #364247;
            font-size: 13px;
            margin: 8px 0;
            min-height: 20px;
            padding: 8px 16px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            display: inline-block;
            animation: pulse 1.5s ease infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
        
        /* Область ввода */
        .input-area {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        
        #message-input {
            flex: 1;
            padding: 14px 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            font-size: 15px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(4px);
            color: #364247;
            transition: all 0.3s ease;
        }
        
        #message-input:focus {
            outline: none;
            border-color: rgba(7, 114, 161, 0.5);
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 0 4px rgba(7, 114, 161, 0.1);
        }
        
        #message-input::placeholder {
            color: #364247;
            opacity: 0.5;
        }
        
        #send-btn {
            padding: 14px 28px;
            background: rgba(7, 114, 161, 0.2);
            backdrop-filter: blur(4px);
            color: #0772A1;
            border: 1px solid rgba(7, 114, 161, 0.3);
            border-radius: 30px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            box-shadow: 0 4px 12px rgba(7, 114, 161, 0.15);
        }
        
        #send-btn:hover {
            background: rgba(7, 114, 161, 0.35);
            border-color: #0772A1;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(7, 114, 161, 0.25);
        }
        
        /* Скроллбар */
        .messages-container::-webkit-scrollbar {
            width: 6px;
        }
        
        .messages-container::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }
        
        .messages-container::-webkit-scrollbar-thumb {
            background: rgba(7, 114, 161, 0.3);
            border-radius: 3px;
        }
        
        .messages-container::-webkit-scrollbar-thumb:hover {
            background: rgba(7, 114, 161, 0.5);
        }
        
        /* Адаптивность */
        @media (max-width: 600px) {
            body {
                padding: 12px;
            }
            
            .user-bar {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
            
            .message {
                max-width: 85%;
            }
            
            .input-area {
                flex-direction: column;
            }
            
            #send-btn {
                width: 100%;
            }
            
            .chat-avatar, .chat-avatar-placeholder {
                width: 48px;
                height: 48px;
                font-size: 20px;
            }
            
            .chat-name {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Хедер -->
        <div class="header">
            <a href="/chats" class="back-link">← К списку чатов</a>
            
            <div class="user-bar">
                {% if username %}
                <span>Привет, <strong>{{ username }}</strong></span>
                <div class="nav-links">
                    <a href="/logout" class="nav-link">Выйти</a>
                </div>
                {% else %}
                <div class="nav-links">
                    <a href="/login" class="nav-link">Вход</a>
                    <a href="/register" class="nav-link">Регистрация</a>
                </div>
                {% endif %}
            </div>
        </div>
        
        <!-- Основной контент -->
        <div class="content">
            <!-- Шапка чата -->
            <div class="chat-header">
                {% if other_avatar %}
                <img src="{{ other_avatar }}" alt="Avatar" class="chat-avatar">
                {% else %}
                <div class="chat-avatar-placeholder">
                    {{ other_user[0]|upper }}
                </div>
                {% endif %}
                <div class="chat-info">
                    <div class="chat-name">{{ other_user }}</div>
                    <div class="chat-status">онлайн</div>
                </div>
            </div>
            
            <!-- Сообщения -->
            <div class="messages-container" id="messages-container">
                {% for message in messages %}
                <div class="message {% if message.user_id == user_id %}own{% else %}other{% endif %}">
                    <div class="message-content">{{ message.content }}</div>
                    <div class="message-time">{{ message.date }}</div>
                </div>
                {% endfor %}
            </div>
            
            <!-- Индикатор печатания -->
            <div class="typing-indicator" id="typing-indicator"></div>
            
            <!-- Область ввода -->
            <div class="input-area">
                <input type="text" id="message-input" placeholder="Написать сообщение...">
                <button id="send-btn">Отправить</button>
            </div>
        </div>
    </div>

    <script>
        const socket = io(window.location.origin);
        const chatId = {{ chat_id }};
        const userId = "{{ user_id }}";
        const otherUser = "{{ other_user }}";
        
        // Аутентификация
        socket.on('connect', function() {
            console.log('🔌 Подключено к серверу');
            socket.emit('authenticate', { user_id: userId });
            socket.emit('join_chat', { chat_id: chatId, user_id: userId });
        });
        
        // Подтверждение аутентификации
        socket.on('authenticated', function(data) {
            console.log('✅ Аутентификация успешна');
        });
        
        // Новое сообщение
        socket.on('new_message', function(data) {
            if (data.chat_id == chatId) {
                addMessage(data);
            }
        });
        
        // Кто-то печатает
        socket.on('user_typing', function(data) {
            if (data.chat_id == chatId && data.user_id != userId) {
                const indicator = document.getElementById('typing-indicator');
                if (data.typing) {
                    indicator.textContent = `${otherUser} печатает...`;
                    indicator.style.display = 'inline-block';
                } else {
                    indicator.style.display = 'none';
                }
            }
        });
        
        // Отправка сообщения
        document.getElementById('send-btn').onclick = sendMessage;
        document.getElementById('message-input').onkeypress = function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        };
        
        // Отслеживание печатания
        let typingTimer;
        document.getElementById('message-input').oninput = function() {
            socket.emit('typing', {
                chat_id: chatId,
                user_id: userId,
                typing: true
            });
            
            clearTimeout(typingTimer);
            typingTimer = setTimeout(function() {
                socket.emit('typing', {
                    chat_id: chatId,
                    user_id: userId,
                    typing: false
                });
            }, 1000);
        };
        
        function sendMessage() {
            const input = document.getElementById('message-input');
            const content = input.value.trim();
            
            if (content) {
                socket.emit('send_message', {
                    chat_id: chatId,
                    user_id: userId,
                    content: content
                });
                
                input.value = '';
            }
        }
        
        function addMessage(data) {
            const container = document.getElementById('messages-container');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${data.user_id == userId ? 'own' : 'other'}`;
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = data.content;
            
            const timeDiv = document.createElement('div');
            timeDiv.className = 'message-time';
            timeDiv.textContent = data.timestamp || 'только что';
            
            messageDiv.appendChild(contentDiv);
            messageDiv.appendChild(timeDiv);
            container.appendChild(messageDiv);
            
            // Прокрутка вниз
            container.scrollTop = container.scrollHeight;
        }
        
        // Прокрутка вниз при загрузке
        window.onload = function() {
            const container = document.getElementById('messages-container');
            container.scrollTop = container.scrollHeight;
        };
    </script>
</body>
</html>
